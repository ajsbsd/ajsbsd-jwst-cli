  divergence: null
  once: true

- id: eisenhower_farewell_1961
  year: 1961
  era: eisenhower_era
  title: "Eisenhower's Farewell Warning"
  description: >
    On January 17, 1961, three days before leaving office, President Eisenhower
    delivers his farewell address and warns the American people about the
    Military-Industrial Complex — the dangerous fusion of the military
    establishment and the defense industry, which now constitutes a permanent
    lobby with its own political power.
  conditions:
    - figure_active: eisenhower
  narrative: >
    Eisenhower spent two terms adding to the very apparatus he is now warning
    against. He knows this. The speech is more confession than policy. "In the
    councils of government, we must guard against the acquisition of unwarranted
    influence, whether sought or unsought, by the military-industrial complex."
    The generals watch the address from the Pentagon. LeMay, already retired
    from SAC command, watches it from his study and considers it the most naive
    thing he has ever heard a President say. You do not warn people about
    the weather, he believes. You fly in it or you don't.
  outcomes:
    meters:
      - name: civilian_oversight
        delta: 3
      - name: public_support
        delta: 5
      - name: economic_dependence
        delta: -2
  divergence: null
  once: true
