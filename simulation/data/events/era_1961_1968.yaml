        stat: public_influence
        delta: -15
  divergence: null
  once: true

- id: gulf_of_tonkin_1964
  year: 1964
  era: mcnamara_era
  title: "Gulf of Tonkin — The Report That Started a War"
  description: >
    The Johnson administration reports that North Vietnamese gunboats attacked
    U.S. destroyers in the Gulf of Tonkin on August 4, 1964. The attack almost
    certainly did not happen. Congress passes the Gulf of Tonkin Resolution,
    giving the President blanket authority to conduct military operations
    in Southeast Asia without a declaration of war.
  conditions:
    - figure_active: johnson
    - figure_active: mcnamara
  narrative: >
    Secretary McNamara tells Congress the attack is confirmed. Signals
    intelligence reports are ambiguous — the NSA analysts who processed the
    intercepts note privately that the August 4 "attack" was likely a misread
    of radar returns caused by nervous sonar operators. McNamara is told this.
    He does not tell Congress. The Resolution passes 416 to 0 in the House
    and 88 to 2 in the Senate. The information monopoly has just been used,
    for the first time at full scale, to take the country to war.
  outcomes:
    meters:
      - name: information_monopoly
