# Era 3: McNamara, Flexible Response, Cuba, Vietnam (1961–1968)
# 7 events covering the Bay of Pigs, McNamara's systems analysis, Cuban Missile
# Crisis, LeMay's forced retirement, Gulf of Tonkin, Rolling Thunder, and Tet.

- id: mcnamara_takes_over_1961
  year: 1961
  era: mcnamara_era
  title: "McNamara Arrives with a Spreadsheet"
  description: >
    Robert McNamara is confirmed as Secretary of Defense. He immediately
    begins applying Ford Motor Company management principles to the Pentagon,
    introducing "systems analysis" to determine military spending priorities.
    LeMay is openly contemptuous.
  conditions:
    - figure_active: mcnamara
    - figure_active: lemay
  narrative: >
    McNamara walks into the Pentagon with twelve Harvard-educated analysts and
    a methodology for measuring everything. He can tell you the cost per
    tactical nuclear sortie. He can tell you the optimal bomb tonnage per
    square kilometer of industrial target. He cannot tell you what it feels
    like to watch a B-29 crew burn to death over Ploesti. LeMay sits across
    the table from him and says nothing for most of the first briefing.
    "He thinks he can win wars with mathematics," LeMay tells an aide afterward.
    "He has never lost anyone."
  outcomes:
    meters:
      - name: civilian_oversight
        delta: 8
      - name: information_monopoly
        delta: -5
      - name: escalation_risk
        delta: -5
    figure_stat_changes:
      - figure: mcnamara
        stat: political_skill
        delta: 10
      - figure: lemay
        stat: political_skill
        delta: -5
  divergence: null
  once: true

- id: cuban_missile_crisis_1962
  year: 1962
  era: mcnamara_era
  title: "Thirteen Days — The World Holds Its Breath"
  description: >
    Soviet nuclear missiles are discovered in Cuba. LeMay, as Air Force Chief
    of Staff, advocates immediate massive airstrikes. Kennedy chooses a naval
    blockade. Over thirteen days, the world comes closer to nuclear war than
    at any other point in history.
  conditions:
    - figure_active: lemay
    - figure_active: mcnamara
  narrative: >
    LeMay lays out his proposal at the ExComm table: 1,080 sorties in the
    first day, targeting all known missile sites, airfields, and SAM batteries.
    "We'd take out everything," he tells Kennedy. "Absolute minimum casualties
    on our side." Kennedy asks what happens next. LeMay doesn't answer because
    he considers "what happens next" a political question, not a military one.
    Kennedy chooses the blockade. The crisis resolves. Khrushchev backs down.
    LeMay walks out of the final ExComm meeting and tells colleagues it was
    "the greatest defeat in our history." He means it. The message sent to Moscow,
    in his view, was: we will flinch.
  outcomes:
    meters:
      - name: escalation_risk
        delta: 25
      - name: civilian_oversight
        delta: -10
