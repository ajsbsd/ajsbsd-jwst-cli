- id: rolling_thunder_begins_1965
  year: 1965
  era: mcnamara_era
  title: "Rolling Thunder — Gradualism as Doctrine"
  description: >
    Operation Rolling Thunder begins. McNamara and Johnson personally select
    specific bombing targets from the White House basement each Tuesday,
    refusing to authorise strikes on Hanoi's port facilities, Chinese
    border areas, or SAM sites under construction. LeMay calls it "bombing
    for appearances, not results."
  conditions:
    - figure_active: mcnamara
    - figure_active: johnson
  narrative: >
    The targeting list arrives in the briefing room each Tuesday morning. It
    lists approved targets, prohibited zones, and required bomb damage assessment
    intervals. Air Force pilots call the prohibited zones "the sanctuaries."
    The enemy builds their SAM batteries inside the sanctuaries, knowing the
    Americans will not touch them until construction is complete. Rolling Thunder
    will run for three years, drop more ordnance than the entire Pacific theater
    of World War II, and achieve none of its stated objectives. McNamara's
    systems analysts will produce monthly progress reports showing positive
    trends in every metric. The war will be getting better, on paper, until
    the day it ends.
  outcomes:
    meters:
      - name: information_monopoly
        delta: 12
