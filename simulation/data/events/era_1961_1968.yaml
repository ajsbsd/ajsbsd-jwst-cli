- id: tet_offensive_1968
  year: 1968
  era: mcnamara_era
  title: "Tet — The Metrics Lie"
  description: >
    On January 30, 1968, North Vietnamese forces simultaneously attack 108
    cities and towns across South Vietnam during the Tet holiday ceasefire.
    The military had been reporting that the enemy was near collapse. The
    attack makes those reports impossible to defend.
  conditions:
    - figure_active: johnson
  narrative: >
    The attack begins at 2:47 AM in Saigon. By morning, enemy commandos have
    penetrated the U.S. Embassy compound. The American public had been told
    for years that the war was being won. They are watching it on television.
    McNamara has already resigned. Johnson will not seek re-election.
    The information monopoly has broken, briefly, in full public view.
    It will be repaired. It always is. But the public will not fully trust
    the military's numbers again for a generation. This is, in the long run,
    not as limiting a constraint as it should be.
  outcomes:
    meters:
      - name: public_support
        delta: -20
      - name: civilian_oversight
        delta: -5
      - name: information_monopoly
        delta: -8
      - name: escalation_risk
        delta: -5
  divergence: null
