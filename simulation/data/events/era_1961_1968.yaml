- id: lemay_forced_out_1965
  year: 1965
  era: mcnamara_era
  title: "LeMay Is Retired — McNamara Wins the Bureaucratic War"
  description: >
    General Curtis LeMay is effectively forced into retirement as Air Force
    Chief of Staff. McNamara has systematically defunded the manned bomber
    fleet, shifted the nuclear deterrent to ICBMs, and frozen LeMay out of
    every major procurement decision. LeMay runs for Vice President on George
    Wallace's ticket in 1968.
  conditions:
    - figure_active: lemay
    - figure_active: mcnamara
  narrative: >
    LeMay files his retirement papers and clears out his desk at the Pentagon.
    He takes nothing except a cigar cutter and a photograph of a B-29 over
    the Pacific. McNamara sends a polite note. LeMay does not respond.
    In his memoir, LeMay will write: "I was not fired because I was wrong.
    I was fired because I was right about everything, and a man who is right
    about everything in Washington is the most dangerous thing alive."
    The machine he built — SAC, the nuclear triad, the doctrine of
    overwhelming deterrence — will run for another thirty years without him.
    It will not need him.
  outcomes:
    meters:
      - name: civilian_oversight
        delta: 5
      - name: sac_readiness
        delta: -8
      - name: information_monopoly
        delta: 8
    figure_stat_changes:
